{% extends "base.html" %}
{% block content %}
<section class="destination-page">
  <h1>存储目的地</h1>

  <a class="destination-add" href="{{ url_for('destination_new') }}">
    <span class="plus-icon"></span>
    <span>
      <strong>添加新的存储目的地</strong>
      <small>配置一个新的备份存储位置。</small>
    </span>
  </a>

  <div class="section-divider"><span>或管理已保存的存储目的地</span></div>

  {% for cfg in configs %}
    <div class="destination-card">
      <div class="provider-logo webdav-logo">WebDAV</div>
      <div>
        <h2>WebDAV #{{ cfg.id }}</h2>
        <p>{{ cfg.base_url.rstrip("/") }}/{{ cfg.remote_dir.strip("/") }}</p>
      </div>
      <a class="button" href="{{ url_for('webdav_detail', config_id=cfg.id) }}">管理 -></a>
    </div>
  {% else %}
    <div class="empty-state">还没有保存的存储目的地。</div>
  {% endfor %}
</section>
{% endblock %}
