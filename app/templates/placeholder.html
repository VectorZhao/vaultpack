{% extends "base.html" %}
{% block content %}
<section class="panel empty-state">
  <span class="empty-icon" aria-hidden="true"></span>
  <h1>{{ title }}</h1>
  <p>{{ message }}</p>
  {% if action_url and action_label %}
    <a class="button primary" href="{{ action_url }}">{{ action_label }}</a>
  {% endif %}
</section>
{% endblock %}
