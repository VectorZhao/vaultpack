{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>{{ form_title or "WebDAV 配置" }}</h1>
  <div class="help-box">
    <strong>InfiniCLOUD / TeraCLOUD：</strong>
    请在账户页面启用“外部应用连接”，然后填写页面显示的 WebDAV 连接地址、连接 ID 和应用密码。
    如果使用备份区域地址，通常应把 WebDAV 地址填写为包含 <code>/backup</code> 的地址，远端目录只填其下级目录。
  </div>
  <form id="webdav-config-form" method="post" action="{{ url_for('webdav_new_post') if is_new else url_for('webdav_post', config_id=cfg.id) }}" class="form">
    <label>WebDAV 地址<input name="base_url" value="{{ cfg.base_url if cfg else '' }}" placeholder="https://example.com/dav" required></label>
    <label>账号<input name="username" value="{{ cfg.username if cfg else '' }}" required></label>
    <label>密码<input name="password" type="password" placeholder="{{ '留空表示不修改已保存密码' if cfg else '' }}" {% if not cfg %}required{% endif %}></label>
    <label>远端备份目录<input name="remote_dir" value="{{ cfg.remote_dir if cfg else '' }}" required></label>
  </form>

  <div class="form-actions">
    <a class="button secondary" href="{{ url_for('destinations') }}">{{ "取消" if is_new else "返回" }}</a>
    {% if is_new %}
      <button form="webdav-config-form" class="primary">保存&测试</button>
    {% else %}
      <button form="webdav-config-form" class="primary">保存</button>
      <form method="post" action="{{ url_for('webdav_test_config', config_id=cfg.id) }}">
        <button class="secondary">测试连接</button>
      </form>
    {% endif %}
  </div>
</section>
{% endblock %}
