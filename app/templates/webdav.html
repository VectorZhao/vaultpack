{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>WebDAV 配置</h1>
  <div class="help-box">
    <strong>InfiniCLOUD / TeraCLOUD：</strong>
    请在 MyPage 启用 External App Connection，然后填写页面显示的 WebDAV 连接 URL、连接 ID 和 App Password。
    如果使用备份区域 URL，通常应把 WebDAV 地址填写为包含 <code>/backup</code> 的地址，远端目录只填其下级目录。
  </div>
  <form method="post" class="form">
    <label>WebDAV 地址<input name="base_url" value="{{ cfg.base_url if cfg else '' }}" placeholder="https://example.com/dav" required></label>
    <label>账号<input name="username" value="{{ cfg.username if cfg else '' }}" required></label>
    <label>密码<input name="password" type="password" placeholder="{{ '留空表示不修改已保存密码' if cfg else '' }}" {% if not cfg %}required{% endif %}></label>
    <label>远端备份目录<input name="remote_dir" value="{{ cfg.remote_dir if cfg else '/backups' }}" required></label>
    <div class="row-actions">
      <button class="primary">保存</button>
    </div>
  </form>
  <form method="post" action="{{ url_for('webdav_test') }}" class="inline-form">
    <button>测试连接</button>
  </form>
</section>
{% endblock %}
